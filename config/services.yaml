services:
    _defaults:
        autowire: true
        autoconfigure: true

    Morfeditorial\MachinimaTelegramAdapter\:
        resource: '../src/'
        exclude: '../src/MachinimaTelegramAdapterBundle.php'

    Morfeditorial\MachinimaTelegramAdapter\Oidc\TelegramOidcConfiguration:
        arguments:
            $clientId: '%env(TELEGRAM_OIDC_CLIENT_ID)%'
            $clientSecret: '%env(TELEGRAM_OIDC_CLIENT_SECRET)%'
            $redirectUri: '%env(TELEGRAM_OIDC_REDIRECT_URI)%'

    Morfeditorial\MachinimaTelegramAdapter\MiniApp\TelegramMiniAppIdentityProvider:
        arguments:
            $botToken: '%env(TELEGRAM_BOT_TOKEN)%'
